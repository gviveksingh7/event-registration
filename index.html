<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Registration</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(rgba(5,20,60,.75),rgba(5,20,60,.75)),url('https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1600&q=80') center/cover fixed;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:min(92vw,430px);background:rgba(255,255,255,.12);backdrop-filter:blur(14px);padding:28px;border-radius:20px;color:#fff}
input,button{width:100%;padding:13px;margin:8px 0;border-radius:10px;border:none}
button{background:#f2c94c;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h2>Event Registration</h2>
<p>Please fill your details.</p>
<form onsubmit="event.preventDefault();alert('Demo only. Connect to Google Sheets to save data.');">
<input placeholder="Full Name" required>
<input placeholder="Designation" required>
<input placeholder="Department" required>
<input placeholder="Mobile Number" required>
<input type="email" placeholder="Email">
<button>Register Now</button>
</form>
</div>
</body>
</html>
